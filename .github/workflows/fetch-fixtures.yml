name: Fetch Mundial 2026 Fixtures

on:
  schedule:
    # Cada 15 minutos — 1 sola call por ejecucion = 96 calls/dia (limite Free: 100)
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch y generar fixtures.json
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
        run: python3 scripts/fetch_fixtures.py

      - name: Commit y push si hay cambios
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add data/fixtures.json data/fixtures_raw.json

          if [ -f data/standings_raw.json ]; then
            git rm --cached data/standings_raw.json 2>/dev/null || true
            rm -f data/standings_raw.json
          fi

          if git diff --staged --quiet; then
            echo "Sin cambios."
          else
            TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M UTC')
            git commit -m "data: fixtures actualizados $TIMESTAMP"
            git push
          fi
