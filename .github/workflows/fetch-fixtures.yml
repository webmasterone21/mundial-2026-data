#!/usr/bin/env python3
"""
fetch_fixtures.py — GitHub Action · Mundial 2026
Guarda todos los partidos terminados (grupos + llaves) en data/fixtures.json.

Cambios respecto a la versión anterior:
  - Ya NO filtra por "Group Stage" solamente.
  - Guarda TODOS los fixtures con status FT / AET / PEN.
  - Para partidos de llaves agrega penH / penA cuando hubo tanda de penales.
  - El campo "group" solo se incluye para partidos de fase de grupos.

Rate limit Free plan API-Football: 100 req/día.
Esta función usa 1 sola llamada → seguro.
"""

import json
import os
import sys
from datetime import datetime, timezone
import urllib.request

API_KEY = os.environ.get("API_FOOTBALL_KEY", "")
LEAGUE  = 1        # FIFA World Cup
SEASON  = 2026
OUT     = "data/fixtures.json"

# ── Grupos FIFA 2026 (fallback si la API no manda el campo group) ─────────────
GROUP_MAP = {
    "Mexico": "A", "South Africa": "A", "South Korea": "A", "Czech Republic": "A",
    "Czechia": "A",
    "Canada": "B", "Bosnia and Herzegovina": "B", "Qatar": "B", "Switzerland": "B",
    "Brazil": "C", "Morocco": "C", "Haiti": "C", "Scotland": "C",
    "United States": "D", "Paraguay": "D", "Australia": "D", "Turkey": "D",
    "Türkiye": "D",
    "Germany": "E", "Curaçao": "E", "Ivory Coast": "E", "Ecuador": "E",
    "Côte d'Ivoire": "E",
    "Netherlands": "F", "Japan": "F", "Sweden": "F", "Tunisia": "F",
    "Belgium": "G", "Egypt": "G", "Iran": "G", "New Zealand": "G",
    "Spain": "H", "Cape Verde": "H", "Saudi Arabia": "H", "Uruguay": "H",
    "France": "I", "Senegal": "I", "Iraq": "I", "Norway": "I",
    "Argentina": "J", "Algeria": "J", "Austria": "J", "Jordan": "J",
    "Portugal": "K", "DR Congo": "K", "Uzbekistan": "K", "Colombia": "K",
    "England": "L", "Croatia": "L", "Ghana": "L", "Panama": "L",
}

# Rondas que son fase de grupos (para incluir el campo group en el JSON)
GROUP_ROUNDS = {"Group Stage - 1", "Group Stage - 2", "Group Stage - 3"}


def fetch(url, key):
    req = urllib.request.Request(url, headers={"x-apisports-key": key})
    with urllib.request.urlopen(req, timeout=30) as r:
        return json.loads(r.read())


def main():
    if not API_KEY:
        print("ERROR: API_FOOTBALL_KEY no definida", file=sys.stderr)
        sys.exit(1)

    url = f"https://v3.football.api-sports.io/fixtures?league={LEAGUE}&season={SEASON}"
    print(f"[fetch] GET {url}")
    data = fetch(url, API_KEY)

    errors = data.get("errors", {})
    if errors:
        print(f"ERROR API: {errors}", file=sys.stderr)
        sys.exit(1)

    response = data.get("response", [])
    print(f"[fetch] {len(response)} fixtures recibidos")

    # Rondas de eliminatorias (para no filtrarlas)
    KNOCKOUT_RE = [
        "Round of 32", "Round of 16",
        "Quarter-finals", "Semi-finals",
        "3rd Place Final", "Final"
    ]

    output = []

    for f in response:
        status   = f["fixture"]["status"]["short"]   # FT, AET, PEN, NS, 1H …
        round_   = f["league"].get("round", "")
        group_   = f["league"].get("group", "") or ""
        home_    = f["teams"]["home"]["name"]
        away_    = f["teams"]["away"]["name"]
        goals_h  = f["goals"].get("home")
        goals_a  = f["goals"].get("away")

        # Solo partidos terminados
        if status not in ("FT", "AET", "PEN"):
            continue

        is_group    = round_ in GROUP_ROUNDS
        is_knockout = any(round_.startswith(k) for k in KNOCKOUT_RE)

        if not is_group and not is_knockout:
            continue

        if goals_h is None or goals_a is None:
            continue

        row = {
            "id":     f["fixture"]["id"],
            "date":   f["fixture"]["date"],
            "status": status,
            "round":  round_,
            "home":   home_,
            "away":   away_,
            "goalsH": goals_h,
            "goalsA": goals_a,
        }

        # ── Grupo (solo fase de grupos) ────────────────────────────────────
        if is_group:
            grp = group_
            if not grp:
                grp = "Group " + (GROUP_MAP.get(home_) or GROUP_MAP.get(away_) or "")
            row["group"] = grp

        # ── Penales (solo si status = PEN) ─────────────────────────────────
        if status == "PEN":
            pen = f.get("score", {}).get("penalty", {})
            pen_h = pen.get("home")
            pen_a = pen.get("away")
            if pen_h is not None and pen_a is not None:
                row["penH"] = pen_h
                row["penA"] = pen_a

        output.append(row)

    os.makedirs("data", exist_ok=True)

    result = {
        "generated_at": datetime.now(timezone.utc).isoformat(),
        "total":        len(output),
        "fixtures":     output,
    }

    with open(OUT, "w", encoding="utf-8") as fh:
        json.dump(result, fh, ensure_ascii=False, separators=(",", ":"))

    group_count    = sum(1 for r in output if "group" in r)
    knockout_count = sum(1 for r in output if "group" not in r)
    print(f"[ok] {OUT} → {len(output)} fixtures "
          f"({group_count} grupos, {knockout_count} llaves)")


if __name__ == "__main__":
    main()
