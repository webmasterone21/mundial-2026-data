name: Fetch Mundial 2026 Fixtures

on:
  schedule:
    # Cada 15 minutos — 1 sola call por ejecución = 96 calls/día (dentro del límite Free de 100)
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Fetch standings desde API-Football
        env:
          API_KEY: ${{ secrets.API_FOOTBALL_KEY }}
        run: |
          if [ -z "$API_KEY" ]; then
            echo "ERROR: API_FOOTBALL_KEY secret no configurado"
            exit 1
          fi

          # UNA sola call — standings trae puntos, goles y grupos de todos los equipos
          curl -s \
            -H "x-apisports-key: $API_KEY" \
            "https://v3.football.api-sports.io/standings?league=1&season=2026" \
            -o data/standings_raw.json

          # Verificar JSON válido
          if ! python3 -c "import json; json.load(open('data/standings_raw.json'))" 2>/dev/null; then
            echo "ERROR: respuesta inválida de la API"
            cat data/standings_raw.json
            exit 1
          fi

          echo "Standings descargados"

      - name: Generar fixtures.json desde standings
        run: |
          python3 << 'EOF'
          import json, datetime

          # Grupos oficiales FIFA — fallback para equipos que la API no resuelve
          GRUPOS_FIFA = {
              "Mexico": "Group A", "South Africa": "Group A", "South Korea": "Group A", "Czechia": "Group A",
              "Switzerland": "Group B", "Canada": "Group B", "Bosnia & Herzegovina": "Group B", "Qatar": "Group B",
              "Brazil": "Group C", "Morocco": "Group C", "Scotland": "Group C", "Haiti": "Group C",
              "USA": "Group D", "Australia": "Group D", "Paraguay": "Group D", "Türkiye": "Group D",
              "Germany": "Group E", "Ivory Coast": "Group E", "Ecuador": "Group E", "Curaçao": "Group E",
              "Netherlands": "Group F", "Japan": "Group F", "Sweden": "Group F", "Tunisia": "Group F",
              "Egypt": "Group G", "Iran": "Group G", "Belgium": "Group G", "New Zealand": "Group G",
              "Spain": "Group H", "Uruguay": "Group H", "Cape Verde Islands": "Group H", "Saudi Arabia": "Group H",
              "France": "Group I", "Norway": "Group I", "Senegal": "Group I", "Iraq": "Group I",
              "Argentina": "Group J", "Austria": "Group J", "Algeria": "Group J", "Jordan": "Group J",
              "Colombia": "Group K", "Portugal": "Group K", "Congo DR": "Group K", "Uzbekistan": "Group K",
              "England": "Group L", "Ghana": "Group L", "Croatia": "Group L", "Panama": "Group L",
          }

          standings_raw = json.load(open('data/standings_raw.json'))

          # Verificar errores de API
          errors = standings_raw.get('errors', {})
          if errors and errors != [] and errors != {}:
              err = errors if isinstance(errors, str) else str(errors)
              raise Exception(f'API error: {err}')

          standings_data = standings_raw.get('response', [])
          if not standings_data:
              raise Exception('standings vacío — posiblemente límite de API agotado')

          # Construir mapa equipo → stats desde standings
          # standings tiene cada equipo UNA vez por grupo, con pts, goles y posición
          team_stats = {}  # { team_name: {group, pts, pj, gf, ga, rank} }

          league_standings = standings_data[0].get('league', {}).get('standings', [])
          for group_list in league_standings:
              for row in group_list:
                  name  = row['team']['name']
                  group = row.get('group', '')
                  # Si la API devuelve "Group Stage" usar el fallback
                  if not group or group == 'Group Stage':
                      group = GRUPOS_FIFA.get(name, '')
                  team_stats[name] = {
                      'group': group,
                      'rank':  row.get('rank', 0),
                      'pts':   row.get('points', 0),
                      'pj':    row['all']['played'],
                      'gf':    row['all']['goals']['for'],
                      'ga':    row['all']['goals']['against'],
                      'gd':    row.get('goalsDiff', 0),
                  }

          print(f'Equipos en standings: {len(team_stats)}')

          # Construir fixtures sintéticos a partir de standings
          # (el widget JS necesita el formato de fixtures para calcular terceros)
          # Guardar también el standings procesado directamente para el widget
          output = {
              'generated_at': datetime.datetime.utcnow().isoformat() + 'Z',
              'source': 'standings',
              'total_teams': len(team_stats),
              'standings': team_stats,
          }

          json.dump(output, open('data/fixtures.json', 'w'), ensure_ascii=False, indent=2)
          print(f'fixtures.json generado con {len(team_stats)} equipos')

          # Verificar grupos resueltos
          sin_grupo = [n for n, s in team_stats.items() if not s['group']]
          if sin_grupo:
              print(f'ADVERTENCIA sin grupo: {sin_grupo}')
          else:
              print('Todos los equipos tienen grupo correcto')
          EOF

      - name: Commit y push si hay cambios
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add data/fixtures.json data/standings_raw.json

          if git diff --staged --quiet; then
            echo "Sin cambios."
          else
            TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M UTC')
            git commit -m "data: standings actualizados $TIMESTAMP"
            git push
          fi
